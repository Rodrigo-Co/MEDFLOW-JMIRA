<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebarMount"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Meu Perfil</h1>
        <p>Seus dados cadastrais</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:800px">

        <!-- Avatar card -->
        <div class="card" style="grid-column:1/-1">
          <div class="card-body" style="display:flex;align-items:center;gap:1.5rem">
            <div id="avatarEl"
              style="width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;flex-shrink:0">
            </div>
            <div>
              <h2 id="nameEl" style="margin:0 0 .2rem"></h2>
              <div style="color:var(--text-muted);font-size:.85rem">Paciente</div>
              <div id="cpfEl" style="color:var(--text-xs);font-size:.78rem;margin-top:.2rem"></div>
            </div>
          </div>
        </div>

        <!-- Edit personal info -->
        <div class="card">
          <div class="card-header"><h3>Informações Pessoais</h3></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Nome</label><input class="form-control" id="fName" /></div>
            <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="fEmail" type="email" /></div>
            <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="fPhone" /></div>
            <div class="form-group">
              <label class="form-label">CPF</label>
              <input class="form-control" id="fCpf" disabled style="background:#f1f5f9;cursor:not-allowed" />
            </div>
            <button class="btn btn-primary" onclick="saveInfo()"><i data-lucide="save"></i> Salvar Alterações</button>
          </div>
        </div>

        <!-- Health summary -->
        <div class="card">
          <div class="card-header"><h3>Resumo de Saúde</h3></div>
          <div class="card-body">
            <div style="margin-bottom:1rem">
              <div class="form-label">Condições</div>
              <div id="conditionsEl"></div>
            </div>
            <div>
              <div class="form-label">Medicações</div>
              <div id="medsEl"></div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script>
    if (!App.requireAuth("patient")) throw new Error("unauth");
    renderSidebar();

    const user    = App.getUser();
    const patient = mockPatients.find(p => p.id === user.id) || user;

    function renderProfile() {
      document.getElementById("avatarEl").textContent = patient.name.charAt(0).toUpperCase();
      document.getElementById("nameEl").textContent   = patient.name;
      document.getElementById("cpfEl").textContent    = "CPF: " + patient.cpf;
      document.getElementById("fName").value  = patient.name;
      document.getElementById("fEmail").value = patient.email;
      document.getElementById("fPhone").value = patient.phone || "";
      document.getElementById("fCpf").value   = patient.cpf;

      document.getElementById("conditionsEl").innerHTML =
        (patient.conditions || []).length === 0
          ? `<span style="font-size:.82rem;color:var(--text-muted)">Nenhuma registrada</span>`
          : (patient.conditions).map(c => `
              <div style="display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:rgba(26,107,122,.05);border-radius:7px;margin-bottom:.3rem;font-size:.82rem">
                <i data-lucide="heart" style="width:13px;height:13px;stroke:var(--primary);flex-shrink:0"></i> ${c}
              </div>`).join("");

      document.getElementById("medsEl").innerHTML =
        (patient.medications || []).length === 0
          ? `<span style="font-size:.82rem;color:var(--text-muted)">Nenhuma registrada</span>`
          : (patient.medications).map(m => `
              <div style="display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:rgba(126,200,160,.1);border-radius:7px;margin-bottom:.3rem;font-size:.82rem">
                <i data-lucide="pill" style="width:13px;height:13px;stroke:var(--primary-light);flex-shrink:0"></i> ${m}
              </div>`).join("");

      lucide.createIcons();
    }

    function saveInfo() {
      patient.name  = document.getElementById("fName").value.trim();
      patient.email = document.getElementById("fEmail").value.trim();
      patient.phone = document.getElementById("fPhone").value.trim();
      App.toast("Perfil atualizado com sucesso!");
      renderProfile();
    }

    renderProfile();
  </script>
</body>
</html>

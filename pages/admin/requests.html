<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitações – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebarMount"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Solicitações de Alteração</h1>
        <p>Gerencie pedidos de alteração de dados dos médicos</p>
      </div>

      <h2 style="font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem">
        <i data-lucide="clock" style="width:15px;height:15px"></i> Pendentes
      </h2>
      <div id="pendingList" style="margin-bottom:2rem"></div>

      <div id="resolvedSection" style="display:none">
        <h2 style="font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem">
          <i data-lucide="check-circle" style="width:15px;height:15px"></i> Resolvidos
        </h2>
        <div id="resolvedList"></div>
      </div>
    </main>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script>
    if (!App.requireAuth("admin")) throw new Error("unauth");
    renderSidebar();

    const fieldLabel = f => ({ name: "Nome", email: "E-mail", phone: "Telefone" }[f] || f);

    function render() {
      const pending  = mockDataChangeRequests.filter(r => r.status === "pendente");
      const resolved = mockDataChangeRequests.filter(r => r.status !== "pendente");

      // Pending
      document.getElementById("pendingList").innerHTML = pending.length === 0
        ? `<div class="empty"><i data-lucide="inbox"></i><p>Nenhuma solicitação pendente</p></div>`
        : pending.map(r => `
          <div class="list-item" style="border:1px solid #fde68a;margin-bottom:.75rem">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem">
              <div style="display:flex;align-items:center;gap:.75rem">
                <div style="width:38px;height:38px;border-radius:50%;background:rgba(42,143,159,.12);display:flex;align-items:center;justify-content:center">
                  <i data-lucide="user" style="width:18px;height:18px;stroke:var(--primary-light)"></i>
                </div>
                <div>
                  <div style="font-weight:600;font-size:.9rem">${r.requesterName}</div>
                  <div style="font-size:.75rem;color:var(--text-muted)">Solicitado em ${App.formatDate(r.createdAt)}</div>
                </div>
              </div>
              ${App.statusBadge(r.status)}
            </div>
            <div style="background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem;margin-bottom:.85rem">
              <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.5rem">Alteração: <strong>${fieldLabel(r.fieldName)}</strong></div>
              <div style="display:flex;align-items:center;gap:.65rem;font-size:.82rem">
                <span style="background:#fee2e2;color:#b91c1c;padding:.2rem .65rem;border-radius:6px">${r.oldValue}</span>
                <i data-lucide="arrow-right" style="width:14px;height:14px;stroke:var(--text-xs)"></i>
                <span style="background:#dcfce7;color:#15803d;padding:.2rem .65rem;border-radius:6px">${r.newValue}</span>
              </div>
            </div>
            <div style="display:flex;gap:.6rem">
              <button class="btn btn-success btn-sm" onclick="resolve('${r.id}', true)"><i data-lucide="check-circle"></i> Aprovar</button>
              <button class="btn btn-danger btn-sm"  onclick="resolve('${r.id}', false)"><i data-lucide="x-circle"></i> Rejeitar</button>
            </div>
          </div>
        `).join("");

      // Resolved
      if (resolved.length > 0) {
        document.getElementById("resolvedSection").style.display = "block";
        document.getElementById("resolvedList").innerHTML = resolved.map(r => `
          <div class="list-item" style="opacity:.8;margin-bottom:.6rem">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
              <span style="font-weight:500;font-size:.875rem">${r.requesterName}</span>
              ${App.statusBadge(r.status)}
            </div>
            <div style="font-size:.8rem;color:var(--text-muted)">${fieldLabel(r.fieldName)}: "${r.oldValue}" → "${r.newValue}"</div>
            ${r.resolvedByName ? `<div style="font-size:.72rem;color:var(--text-xs);margin-top:.3rem">Por ${r.resolvedByName} em ${App.formatDate(r.resolvedAt)}</div>` : ""}
          </div>
        `).join("");
      }

      lucide.createIcons();
    }

    function resolve(id, approved) {
      App.resolveChangeRequest(id, approved);
      App.toast(approved ? "Solicitação aprovada!" : "Solicitação rejeitada.", approved ? "success" : "info");
      render();
    }

    render();
  </script>
</body>
</html>

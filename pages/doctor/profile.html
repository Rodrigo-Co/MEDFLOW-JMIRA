<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebarMount"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Meu Perfil</h1>
        <p>Gerencie suas informações profissionais</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:800px">
        <!-- Profile card -->
        <div class="card" style="grid-column:1/-1">
          <div class="card-body" style="display:flex;align-items:center;gap:1.5rem">
            <div style="width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;flex-shrink:0" id="avatarEl"></div>
            <div>
              <h2 id="nameEl" style="margin:0 0 .2rem"></h2>
              <div id="specialtyEl" style="color:var(--text-muted);font-size:.875rem"></div>
              <div id="crmEl" style="color:var(--text-xs);font-size:.8rem;margin-top:.2rem"></div>
            </div>
          </div>
        </div>

        <!-- Edit info -->
        <div class="card">
          <div class="card-header"><h3>Informações Pessoais</h3></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Nome Completo</label><input class="form-control" id="fName" /></div>
            <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="fEmail" type="email" /></div>
            <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="fPhone" /></div>
            <button class="btn btn-primary" onclick="saveInfo()"><i data-lucide="save"></i> Salvar Alterações</button>
            <p style="font-size:.72rem;color:var(--text-xs);margin-top:.5rem">Alterações de e-mail requerem aprovação do admin.</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="card">
          <div class="card-header"><h3>Indicadores</h3></div>
          <div class="card-body">
            <div style="display:flex;flex-direction:column;gap:.75rem" id="statsEl"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script>
    if (!App.requireAuth("doctor")) throw new Error("unauth");
    renderSidebar();

    const user = App.getUser();
    const doc  = mockDoctors.find(d => d.id === user.id) || user;

    function renderProfile() {
      document.getElementById("avatarEl").textContent    = doc.name.charAt(0).toUpperCase();
      document.getElementById("nameEl").textContent      = doc.name;
      document.getElementById("specialtyEl").textContent = doc.specialty || "";
      document.getElementById("crmEl").textContent       = doc.crm || "";
      document.getElementById("fName").value  = doc.name;
      document.getElementById("fEmail").value = doc.email;
      document.getElementById("fPhone").value = doc.phone;
      document.getElementById("statsEl").innerHTML = [
        { label:"Atendimentos", value: doc.attendances, icon:"stethoscope", color:"#3b82f6" },
        { label:"Cirurgias",    value: doc.surgeries,   icon:"heart-pulse", color:"var(--primary)" },
        { label:"Exames",       value: doc.exams,       icon:"activity",    color:"#22c55e" },
      ].map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;background:#f8fafc;border-radius:8px">
          <div style="display:flex;align-items:center;gap:.6rem;font-size:.875rem">
            <div style="width:28px;height:28px;border-radius:7px;background:${s.color};display:flex;align-items:center;justify-content:center">
              <i data-lucide="${s.icon}" style="width:13px;height:13px;stroke:#fff"></i>
            </div>
            ${s.label}
          </div>
          <strong>${s.value}</strong>
        </div>
      `).join("");
      lucide.createIcons();
    }

    function saveInfo() {
      const newEmail = document.getElementById("fEmail").value.trim();
      const oldEmail = doc.email;

      if (newEmail !== oldEmail) {
        // Trigger change request
        App.submitChangeRequest("email", oldEmail, newEmail);
        App.toast("Solicitação de alteração de e-mail enviada para aprovação.", "info");
      }

      doc.name  = document.getElementById("fName").value.trim();
      doc.phone = document.getElementById("fPhone").value.trim();
      App.toast("Perfil atualizado com sucesso!");
      renderProfile();
    }

    renderProfile();
  </script>
</body>
</html>

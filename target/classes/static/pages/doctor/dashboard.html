<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard Médico – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header"><h1>Dashboard Médico</h1><p id="welcomeMsg"></p></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-header"><h3>Status dos Chamados</h3></div>
        <div class="card-body"><div class="chart-canvas-wrap"><canvas id="ticketChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Últimos Prontuários</h3></div>
        <div class="card-body" id="recentRecords"><p class="text-muted">Carregando...</p></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Chamados Pendentes</h3></div>
      <div id="openTickets"></div>
    </div>
  </main>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("doctor")) throw 0;
  renderSidebar();
  document.getElementById("welcomeMsg").textContent = "Bem-vindo, " + App.getUser().name;

  async function load() {
    try {
      const [tickets, records] = await Promise.all([
        App.getAllTickets(),
        App.getMyRecords(),
      ]);
      const openT = (tickets||[]).filter(t=>t.status==="aberto");
      const inPr  = (tickets||[]).filter(t=>t.status==="em_andamento");
      const done  = (tickets||[]).filter(t=>t.status==="concluido");

      document.getElementById("statsGrid").innerHTML = [
        {label:"Chamados Abertos", value:openT.length, icon:"alert-circle",  bg:"#f59e0b"},
        {label:"Em Andamento",     value:inPr.length,  icon:"clipboard-list",bg:"var(--primary-light)"},
        {label:"Prontuários",      value:(records||[]).length,icon:"file-text",bg:"var(--primary)"},
        {label:"Pacientes",        value:"—",           icon:"users",         bg:"var(--accent)"},
      ].map(s=>`
        <div class="stat-card">
          <div class="stat-card-top"><span>${s.label}</span>
            <div class="stat-icon" style="background:${s.bg}"><i data-lucide="${s.icon}"></i></div>
          </div>
          <div class="stat-value">${s.value}</div>
        </div>`).join("");

      new Chart(document.getElementById("ticketChart"),{
        type:"doughnut",
        data:{labels:["Abertos","Em Andamento","Concluídos"],
          datasets:[{data:[openT.length,inPr.length,done.length],backgroundColor:["#f59e0b","#2a8f9f","#7ec8a0"],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}},cutout:"55%"},
      });

      document.getElementById("recentRecords").innerHTML = !(records&&records.length)
        ? `<p style="color:var(--text-muted);text-align:center;padding:2rem 0;font-size:.875rem">Nenhum prontuário encontrado</p>`
        : records.slice(0,5).map(r=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;background:#f8fafc;border-radius:8px;margin-bottom:.4rem">
            <div>
              <div style="font-size:.875rem;font-weight:500">${r.patientName}</div>
              <div style="font-size:.75rem;color:var(--text-muted)">${r.diagnosis}</div>
            </div>
            <span style="font-size:.72rem;color:var(--text-xs)">${r.recordDate||r.date}</span>
          </div>`).join("");

      document.getElementById("openTickets").innerHTML = !openT.length
        ? `<p style="padding:1.25rem;text-align:center;color:var(--text-muted);font-size:.875rem">Nenhum chamado pendente</p>`
        : openT.map(t=>`
          <div style="padding:1.1rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem">
            <div>
              <div style="display:flex;gap:.4rem;margin-bottom:.3rem">${App.typeBadge(t.type)} <span style="font-size:.875rem;font-weight:500">${t.patientName}</span></div>
              <div style="font-size:.8rem;color:var(--text-muted)">${t.description}</div>
            </div>
            <span style="font-size:.72rem;color:var(--text-xs);white-space:nowrap">${t.createdAt}</span>
          </div>`).join("");

      lucide.createIcons();
    } catch(e) { App.toast("Erro ao carregar: " + e.message, "error"); }
  }
  load();
</script>
</body>
</html>

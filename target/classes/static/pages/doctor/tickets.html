<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chamados – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header"><h1>Chamados / Pedidos</h1><p>Gerencie solicitações de pacientes</p></div>
    <div class="filter-group">
      <button class="filter-btn active" data-f="all"          onclick="setFilter('all')">Todos</button>
      <button class="filter-btn"        data-f="aberto"       onclick="setFilter('aberto')">Abertos</button>
      <button class="filter-btn"        data-f="em_andamento" onclick="setFilter('em_andamento')">Em Andamento</button>
      <button class="filter-btn"        data-f="concluido"    onclick="setFilter('concluido')">Concluídos</button>
    </div>
    <div id="ticketsList"></div>
  </main>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("doctor")) throw 0;
  renderSidebar();
  let currentFilter = "all";

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.f===f));
    render();
  }

  async function render() {
    App.showLoading("ticketsList");
    try {
      const tickets = await App.getAllTickets(currentFilter==="all"?null:currentFilter);
      if (!tickets||!tickets.length) {
        document.getElementById("ticketsList").innerHTML=`<div class="empty"><i data-lucide="inbox"></i><p>Nenhum chamado encontrado</p></div>`;
        lucide.createIcons(); return;
      }
      document.getElementById("ticketsList").innerHTML = tickets.map(t=>`
        <div class="list-item" style="margin-bottom:.6rem">
          <div class="list-item-row">
            <div style="flex:1">
              <div class="list-item-tags">${App.statusBadge(t.status)} ${App.typeBadge(t.type)} <span style="font-size:.875rem;font-weight:500">${t.patientName}</span></div>
              <div class="list-item-sub">${t.description}</div>
              <div class="list-item-meta">Especialidade: ${t.specialty} · Criado: ${t.createdAt}</div>
            </div>
            <div style="display:flex;gap:.5rem;flex-shrink:0">
              ${t.status==="aberto"       ?`<button class="btn btn-primary btn-sm" onclick="accept('${t.id}')"><i data-lucide="check"></i> Aceitar</button>`:""}
              ${t.status==="em_andamento" ?`<button class="btn btn-success btn-sm" onclick="complete('${t.id}')"><i data-lucide="check-circle"></i> Concluir</button>`:""}
            </div>
          </div>
        </div>`).join("");
      lucide.createIcons();
    } catch(e) { App.showError("ticketsList","Erro: "+e.message); }
  }

  async function accept(id) {
    try { await App.acceptTicket(id); App.toast("Chamado aceito!"); render(); }
    catch(e) { App.toast("Erro: "+e.message,"error"); }
  }
  async function complete(id) {
    try { await App.completeTicket(id); App.toast("Chamado concluído!"); render(); }
    catch(e) { App.toast("Erro: "+e.message,"error"); }
  }

  render();
</script>
</body>
</html>

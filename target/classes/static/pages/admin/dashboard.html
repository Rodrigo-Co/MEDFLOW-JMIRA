<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard Admin – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header"><h1>Dashboard Administrativo</h1><p>Visão geral do hospital</p></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-header"><h3>Chamados por Status</h3></div>
        <div class="card-body"><div class="chart-canvas-wrap"><canvas id="ticketChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Desempenho por Médico</h3></div>
        <div class="card-body">
          <select class="form-control" id="doctorSelect" style="margin-bottom:1rem" onchange="renderDoctorChart()">
            <option value="">Selecione um médico</option>
          </select>
          <div class="chart-canvas-wrap"><canvas id="doctorChart"></canvas></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Médicos do Hospital</h3></div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>Nome</th><th>Especialidade</th><th>CRM</th>
          <th style="text-align:center">Atendimentos</th><th style="text-align:center">Cirurgias</th><th style="text-align:center">Exames</th>
        </tr></thead><tbody id="doctorsBody"></tbody></table>
      </div>
    </div>
  </main>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("admin")) throw 0;
  renderSidebar();
  let doctorChart, doctors = [];

  async function load() {
    try {
      const stats = await App.getDashboard();
      doctors = stats.doctors||[];

      document.getElementById("statsGrid").innerHTML = [
        {label:"Chamados Abertos",   value:stats.ticketsOpen,       icon:"alert-circle", bg:"#f59e0b"},
        {label:"Em Andamento",       value:stats.ticketsInProgress,  icon:"clipboard-list",bg:"var(--primary-light)"},
        {label:"Médicos Ativos",     value:stats.totalDoctors,       icon:"users",        bg:"#8b5cf6"},
        {label:"Solicitações Pendentes",value:stats.pendingRequests, icon:"git-pull-request",bg:"var(--danger)"},
      ].map(s=>`
        <div class="stat-card">
          <div class="stat-card-top"><span>${s.label}</span>
            <div class="stat-icon" style="background:${s.bg}"><i data-lucide="${s.icon}"></i></div>
          </div>
          <div class="stat-value">${s.value}</div>
        </div>`).join("");

      new Chart(document.getElementById("ticketChart"),{
        type:"doughnut",
        data:{labels:["Abertos","Em Andamento","Concluídos"],
          datasets:[{data:[stats.ticketsOpen,stats.ticketsInProgress,stats.ticketsConcluded],backgroundColor:["#f59e0b","#2a8f9f","#7ec8a0"],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}},cutout:"55%"},
      });

      const sel = document.getElementById("doctorSelect");
      doctors.forEach(d=>{
        const o=document.createElement("option"); o.value=d.id; o.textContent=d.name; sel.appendChild(o);
      });

      document.getElementById("doctorsBody").innerHTML = doctors.map(d=>`
        <tr>
          <td><strong>${d.name}</strong></td>
          <td class="text-muted">${d.specialty}</td>
          <td class="text-muted">${d.crm}</td>
          <td style="text-align:center">${d.attendances}</td>
          <td style="text-align:center">${d.surgeries}</td>
          <td style="text-align:center">${d.exams}</td>
        </tr>`).join("");

      lucide.createIcons();
    } catch(e) { App.toast("Erro ao carregar: "+e.message,"error"); }
  }

  function renderDoctorChart() {
    const id  = document.getElementById("doctorSelect").value;
    const doc = doctors.find(d=>d.id===id);
    if (doctorChart) doctorChart.destroy();
    if (!doc) return;
    doctorChart = new Chart(document.getElementById("doctorChart"),{
      type:"bar",
      data:{labels:["Atendimentos","Cirurgias","Exames"],
        datasets:[{data:[doc.attendances,doc.surgeries,doc.exams],backgroundColor:"rgba(26,107,122,.8)",borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:"#f1f5f9"}},x:{grid:{color:"#f1f5f9"}}}},
    });
  }

  load();
</script>
</body>
</html>

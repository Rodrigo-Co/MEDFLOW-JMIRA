# ---------------------------------------------------------------
#  🔧 SUPABASE – Cole suas credenciais abaixo
#  Acesse: Supabase Dashboard → Settings → Database
# ---------------------------------------------------------------
supabase.url=aws-1-us-east-2.pooler.supabase.com
supabase.port=5432
supabase.db=postgres
supabase.username=postgres.yhsjzabrlpgsgrpxaett
supabase.password=medflowbanco
# ---------------------------------------------------------------
#  🔑 JWT Secret – Troque por uma string longa e segura
# ---------------------------------------------------------------
jwt.secret=medflow-super-secret-key-troque-isso-em-producao-123456789
jwt.expiration-ms=86400000

# ---------------------------------------------------------------
#  ⚙️  Spring / JPA (não precisa alterar)
# ---------------------------------------------------------------
spring.application.name=medflow-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://${supabase.url}:${supabase.port}/${supabase.db}
spring.datasource.username=${supabase.username}
spring.datasource.password=${supabase.password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# CORS – adicione a URL do seu frontend aqui
cors.allowed-origins=http://localhost:8080,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://127.0.0.1:8080

logging.level.com.medflow=INFO

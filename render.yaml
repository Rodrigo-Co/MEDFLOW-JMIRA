services:
  - type: web
    name: medflow-jmira
    runtime: docker
    plan: free
    repo: https://github.com/Rodrigo-Co/MEDFLOW-JMIRA
    branch: main
    healthCheckPath: /
    envVars:
      - key: APP_DATASOURCE_URL
        sync: false
      - key: APP_DATASOURCE_USERNAME
        sync: false
      - key: APP_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_MAIL_HOST
        value: smtp.gmail.com
      - key: APP_MAIL_PORT
        value: "587"
      - key: APP_MAIL_USERNAME
        sync: false
      - key: APP_MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TWOFA_EXPIRY_MINUTES
        value: "5"

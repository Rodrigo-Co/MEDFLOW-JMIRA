# ================================================================
#  MedFlow - Configuracao
# ================================================================
app.name=medflow-backend
server.port=8080

app.datasource.url=
app.datasource.username=
app.datasource.password=

jwt.secret=
jwt.expiration-ms=86400000

cors.allowed-origins=http://localhost:8080,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://127.0.0.1:8080

# ================================================================
#  EMAIL SMTP (Gmail)
#  1. Ative verificacao em 2 etapas no Google
#  2. Gere uma Senha de App em: myaccount.google.com/apppasswords
#  3. Preencha abaixo
# ================================================================
app.mail.host=smtp.gmail.com
app.mail.port=587
app.mail.username=
app.mail.password=

# Minutos de validade do codigo 2FA
twofa.expiry-minutes=5

logging.level.com.medframe=INFO

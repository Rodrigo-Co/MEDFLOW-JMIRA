<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Meu Perfil – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header"><h1>Meu Perfil</h1><p>Seus dados cadastrais</p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:800px">
      <div class="card" style="grid-column:1/-1">
        <div class="card-body" style="display:flex;align-items:center;gap:1.5rem">
          <div id="avatarEl" style="width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;flex-shrink:0"></div>
          <div>
            <h2 id="nameEl" style="margin:0 0 .2rem"></h2>
            <div style="color:var(--text-muted);font-size:.85rem">Paciente</div>
            <div id="cpfEl" style="color:var(--text-xs);font-size:.78rem;margin-top:.2rem"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Informações Pessoais</h3></div>
        <div class="card-body">
          <div class="form-group"><label class="form-label">Nome</label><input class="form-control" id="fName"/></div>
          <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="fEmail" type="email"/></div>
          <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="fPhone"/></div>
          <div class="form-group"><label class="form-label">CPF</label><input class="form-control" id="fCpf" disabled style="background:#f1f5f9;cursor:not-allowed"/></div>
          <button class="btn btn-primary" onclick="saveInfo()"><i data-lucide="save"></i> Salvar</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Resumo de Saúde</h3></div>
        <div class="card-body">
          <div class="form-label">Condições</div>
          <div id="conditionsEl" style="margin-bottom:1rem"></div>
          <div class="form-label">Medicações</div>
          <div id="medsEl"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("patient")) throw 0;
  renderSidebar();
  const user = App.getUser();

  async function load() {
    try {
      const p = await App.getPatient(user.id);
      render(p);
    } catch(e) { App.toast("Erro ao carregar perfil", "error"); }
  }

  function render(p) {
    document.getElementById("avatarEl").textContent = p.name.charAt(0).toUpperCase();
    document.getElementById("nameEl").textContent   = p.name;
    document.getElementById("cpfEl").textContent    = "CPF: " + p.cpf;
    document.getElementById("fName").value  = p.name;
    document.getElementById("fEmail").value = p.email;
    document.getElementById("fPhone").value = p.phone||"";
    document.getElementById("fCpf").value   = p.cpf;

    const conds = p.conditions||[];
    document.getElementById("conditionsEl").innerHTML = !conds.length
      ? `<span style="font-size:.82rem;color:var(--text-muted)">Nenhuma registrada</span>`
      : conds.map(c=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:rgba(26,107,122,.05);border-radius:7px;margin-bottom:.3rem;font-size:.82rem"><i data-lucide="heart" style="width:13px;height:13px;stroke:var(--primary)"></i>${c.conditionName||c}</div>`).join("");

    const meds = p.medications||[];
    document.getElementById("medsEl").innerHTML = !meds.length
      ? `<span style="font-size:.82rem;color:var(--text-muted)">Nenhuma registrada</span>`
      : meds.map(m=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:rgba(126,200,160,.1);border-radius:7px;margin-bottom:.3rem;font-size:.82rem"><i data-lucide="pill" style="width:13px;height:13px;stroke:var(--primary-light)"></i>${m.medication||m}</div>`).join("");

    lucide.createIcons();
  }

  async function saveInfo() {
    try {
      const updated = await App.updateMyProfile(user.id,
        document.getElementById("fName").value.trim(),
        document.getElementById("fEmail").value.trim(),
        document.getElementById("fPhone").value.trim());
      render(updated);
      App.toast("Perfil atualizado!");
    } catch(e) { App.toast("Erro: " + e.message, "error"); }
  }

  load();
  function togglePwdField(inputId, iconId) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    document.getElementById(iconId).setAttribute('data-lucide', inp.type === 'password' ? 'eye' : 'eye-off');
    lucide.createIcons();
  }

  async function doChangePassword() {
    const cur  = document.getElementById('pwdCurrent').value;
    const novo = document.getElementById('pwdNew').value;
    const conf = document.getElementById('pwdConfirm').value;
    document.getElementById('pwdError').style.display   = 'none';
    document.getElementById('pwdSuccess').style.display = 'none';

    if (!cur || !novo || !conf) {
      showPwdError('Preencha todos os campos de senha.'); return;
    }
    if (novo.length < 6) {
      showPwdError('A nova senha deve ter no mínimo 6 caracteres.'); return;
    }
    if (novo !== conf) {
      showPwdError('Nova senha e confirmação não coincidem.'); return;
    }
    try {
      await App.changePassword(cur, novo);
      document.getElementById('pwdSuccess').style.display = 'flex';
      document.getElementById('pwdCurrent').value = '';
      document.getElementById('pwdNew').value     = '';
      document.getElementById('pwdConfirm').value = '';
      lucide.createIcons();
    } catch(e) {
      showPwdError(e.message || 'Erro ao alterar a senha.');
    }
  }

  function showPwdError(msg) {
    document.getElementById('pwdErrorMsg').textContent = msg;
    document.getElementById('pwdError').style.display = 'flex';
    lucide.createIcons();
  }
</script>
</body>
</html>

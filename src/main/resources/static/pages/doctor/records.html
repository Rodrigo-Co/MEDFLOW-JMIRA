<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Prontuários – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-top-row">
      <div class="page-header" style="margin:0"><h1>Prontuários</h1><p>Gerencie registros médicos dos pacientes</p></div>
      <button class="btn btn-primary" onclick="openNewModal()"><i data-lucide="plus"></i> Novo Prontuário</button>
    </div>
    <div class="search-wrap">
      <i data-lucide="search"></i>
      <input class="form-control search-input" id="searchInput" placeholder="Buscar por paciente ou diagnóstico..." oninput="debouncedRender()"/>
    </div>
    <div id="recordsList"></div>
  </main>
</div>

<!-- New/Edit Record Modal -->
<div class="modal-overlay" id="newModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3 id="newModalTitle">Novo Prontuário</h3>
      <button class="modal-close" onclick="closeNew()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="margin-bottom:1rem">
        <div class="form-group">
          <label class="form-label">Paciente</label>
          <select class="form-control" id="nPatient"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-control" id="nType" onchange="triggerFormat()">
            <option value="consulta">Consulta</option>
            <option value="cirurgia">Cirurgia</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Diagnóstico</label><input class="form-control" id="nDiagnosis" placeholder="Ex: Hipertensão arterial controlada"/></div>
      <div class="form-group">
        <label class="form-label">Notas brutas <span style="color:var(--text-xs);font-weight:400">(será formatado automaticamente)</span></label>
        <textarea class="form-control" id="nRaw" rows="4" placeholder="Digite as notas de forma livre..." oninput="scheduleFormat()"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;gap:.4rem">
          <i data-lucide="sparkles" style="width:14px;height:14px;stroke:var(--primary)"></i> Prontuário Formatado
        </label>
        <div class="notes-panel" id="nFormatted" style="min-height:120px"><em style="color:var(--text-xs)">Aguardando notas...</em></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNew()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord()"><i data-lucide="save"></i> Salvar Prontuário</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3 id="viewModalTitle">Prontuário</h3>
      <button class="modal-close" onclick="closeView()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="viewModalBody"></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeView()">Fechar</button></div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("doctor")) throw 0;
  renderSidebar();
  lucide.createIcons();

  const userId = App.getUser().id;
  let editingId = null;
  let formatTimer = null;
  let patients = [];

  // Load patients for select
  App.getAllPatients().then(list => {
    patients = list||[];
    const sel = document.getElementById("nPatient");
    patients.forEach(p => {
      const o = document.createElement("option");
      o.value = p.id; o.textContent = p.name;
      sel.appendChild(o);
    });
  });

  // Debounced search
  let searchTimer;
  function debouncedRender() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 350);
  }

  async function render() {
    const q = document.getElementById("searchInput").value;
    App.showLoading("recordsList");
    try {
      const records = await App.getAllRecords(q);
      if (!records||!records.length) {
        document.getElementById("recordsList").innerHTML=`<div class="empty"><i data-lucide="file-x"></i><p>Nenhum prontuário encontrado</p></div>`;
        lucide.createIcons(); return;
      }
      document.getElementById("recordsList").innerHTML = records.map(r=>`
        <div class="list-item" style="margin-bottom:.6rem">
          <div class="list-item-row">
            <div style="flex:1">
              <div class="list-item-tags">
                ${App.typeBadge(r.type)}
                ${r.doctorId===userId?'<span class="badge badge-primary">Meu Prontuário</span>':""}
              </div>
              <div class="list-item-title">${r.patientName}</div>
              <div class="list-item-sub">${r.diagnosis}</div>
              <div class="list-item-meta">Médico: ${r.doctorName} · Data: ${r.recordDate||r.date}
                ${(r.editHistory&&r.editHistory.length)?` · <span style="color:var(--warning)">${r.editHistory.length} edição(ões)</span>`:""}
              </div>
            </div>
            <div style="display:flex;gap:.5rem;flex-shrink:0">
              <button class="btn btn-secondary btn-sm" onclick='viewRecord(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
                <i data-lucide="eye"></i> Ver
              </button>
              ${r.doctorId===userId?`<button class="btn btn-primary btn-sm" onclick='openEditModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
                <i data-lucide="edit-3"></i> Editar</button>`:""}
            </div>
          </div>
        </div>`).join("");
      lucide.createIcons();
    } catch(e) { App.showError("recordsList","Erro: "+e.message); }
  }

  function scheduleFormat() {
    clearTimeout(formatTimer);
    document.getElementById("nFormatted").innerHTML = "<em style='color:var(--text-xs)'>Formatando...</em>";
    formatTimer = setTimeout(async () => {
      const raw  = document.getElementById("nRaw").value;
      const type = document.getElementById("nType").value;
      if (!raw.trim()) { document.getElementById("nFormatted").innerHTML="<em style='color:var(--text-xs)'>Aguardando notas...</em>"; return; }
      try {
        const res = await App.formatNotes(raw, type);
        document.getElementById("nFormatted").textContent = res.formattedNotes||"";
      } catch { document.getElementById("nFormatted").textContent = raw; }
    }, 800);
  }
  function triggerFormat() { scheduleFormat(); }

  function openNewModal() {
    editingId = null;
    document.getElementById("newModalTitle").textContent = "Novo Prontuário";
    document.getElementById("nRaw").value = "";
    document.getElementById("nDiagnosis").value = "";
    document.getElementById("nType").value = "consulta";
    document.getElementById("nFormatted").innerHTML = "<em style='color:var(--text-xs)'>Aguardando notas...</em>";
    document.getElementById("nPatient").disabled = false;
    document.getElementById("newModal").classList.add("open");
    lucide.createIcons();
  }

  function openEditModal(r) {
    editingId = r.id;
    document.getElementById("newModalTitle").textContent = "Editar Prontuário";
    document.getElementById("nPatient").value   = r.patientId;
    document.getElementById("nPatient").disabled = true;
    document.getElementById("nType").value      = r.type;
    document.getElementById("nRaw").value       = r.rawNotes;
    document.getElementById("nDiagnosis").value = r.diagnosis;
    document.getElementById("nFormatted").textContent = r.formattedNotes;
    document.getElementById("newModal").classList.add("open");
    lucide.createIcons();
  }

  function closeNew() { document.getElementById("newModal").classList.remove("open"); }

  async function saveRecord() {
    const type     = document.getElementById("nType").value;
    const raw      = document.getElementById("nRaw").value.trim();
    const diag     = document.getElementById("nDiagnosis").value.trim();
    const fmt      = document.getElementById("nFormatted").textContent.trim();
    if (!raw||!diag) { App.toast("Preencha todos os campos.","error"); return; }
    try {
      if (editingId) {
        await App.editRecord(editingId, type, raw, fmt, diag);
        App.toast("Prontuário atualizado!");
      } else {
        const pid = document.getElementById("nPatient").value;
        if (!pid) { App.toast("Selecione um paciente.","error"); return; }
        await App.createRecord(pid, type, raw, fmt, diag);
        App.toast("Prontuário salvo!");
      }
      closeNew(); render();
    } catch(e) { App.toast("Erro: "+e.message,"error"); }
  }

  function viewRecord(r) {
    document.getElementById("viewModalTitle").textContent = "Prontuário – " + r.patientName;
    document.getElementById("viewModalBody").innerHTML = `
      <div style="display:flex;gap:.5rem;margin-bottom:1rem">${App.typeBadge(r.type)}</div>
      <div class="form-grid" style="margin-bottom:1rem">
        <div><div class="form-label">Paciente</div><div style="font-size:.875rem">${r.patientName}</div></div>
        <div><div class="form-label">Data</div><div style="font-size:.875rem">${r.recordDate||r.date}</div></div>
        <div><div class="form-label">Médico</div><div style="font-size:.875rem">${r.doctorName}</div></div>
        <div><div class="form-label">Diagnóstico</div><div style="font-size:.875rem">${r.diagnosis}</div></div>
      </div>
      <div class="form-label">Prontuário Formatado</div>
      <div class="notes-panel">${r.formattedNotes}</div>
      ${(r.editHistory&&r.editHistory.length)?`
        <div style="margin-top:1rem">
          <div class="form-label" style="margin-bottom:.5rem">Histórico de Edições</div>
          ${r.editHistory.map(e=>`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:.7rem .9rem;margin-bottom:.4rem;font-size:.8rem"><strong>${e.editedByName}</strong> · ${new Date(e.editTimestamp).toLocaleString("pt-BR")}<br><span style="color:var(--text-muted)">${e.changes}</span></div>`).join("")}
        </div>`:""}`;
    document.getElementById("viewModal").classList.add("open");
    lucide.createIcons();
  }
  function closeView() { document.getElementById("viewModal").classList.remove("open"); }

  render();
</script>
</body>
</html>

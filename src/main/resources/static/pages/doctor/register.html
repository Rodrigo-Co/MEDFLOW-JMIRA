<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cadastrar Paciente – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header"><h1>Cadastrar Paciente</h1><p>Registre um novo paciente no sistema</p></div>
    <div id="successMsg" style="display:none;max-width:480px;margin-bottom:1.5rem">
      <div class="alert alert-success"><i data-lucide="check-circle"></i><div>Paciente cadastrado com sucesso!</div></div>
    </div>
    <div class="card" style="max-width:560px"><div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nome Completo *</label><input class="form-control" id="fName"/></div>
        <div class="form-group"><label class="form-label">E-mail *</label><input class="form-control" id="fEmail" type="email"/></div>
        <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="fPhone"/></div>
        <div class="form-group"><label class="form-label">CPF *</label><input class="form-control" id="fCpf" placeholder="000.000.000-00"/></div>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem">
        <button class="btn btn-primary" onclick="save()"><i data-lucide="user-plus"></i> Cadastrar</button>
        <a href="dashboard.html" class="btn btn-secondary">Cancelar</a>
      </div>
    </div></div>
  </main>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("doctor")) throw 0;
  renderSidebar();
  lucide.createIcons();

  async function save() {
    const name  = document.getElementById("fName").value.trim();
    const email = document.getElementById("fEmail").value.trim();
    const phone = document.getElementById("fPhone").value.trim();
    const cpf   = document.getElementById("fCpf").value.trim();
    if (!name||!email||!cpf) { App.toast("Preencha nome, e-mail e CPF.","error"); return; }
    try {
      await App.registerPatient(name, email, phone, cpf);
      App.toast("Paciente cadastrado com sucesso!");
      document.getElementById("successMsg").style.display = "block";
      ["fName","fEmail","fPhone","fCpf"].forEach(id=>document.getElementById(id).value="");
      lucide.createIcons();
    } catch(e) { App.toast("Erro: "+e.message,"error"); }
  }
</script>
</body>
</html>

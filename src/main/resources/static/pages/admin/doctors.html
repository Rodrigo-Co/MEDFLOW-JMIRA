<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gerenciar Médicos – MedFlow</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-top-row">
      <div class="page-header" style="margin:0">
        <h1>Gerenciar Médicos</h1><p>Cadastre e edite perfis de médicos</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <i data-lucide="plus"></i> Novo Médico
      </button>
    </div>
    <div id="doctorsList"></div>
  </main>
</div>

<!-- Modal Cadastro/Edição -->
<div class="modal-overlay" id="doctorModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Cadastrar Médico</h3>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nome Completo</label><input class="form-control" id="fName"/></div>
        <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="fEmail" type="email"/></div>
        <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="fPhone"/></div>
        <div class="form-group"><label class="form-label">CPF</label><input class="form-control" id="fCpf"/></div>
        <div class="form-group"><label class="form-label">Especialidade</label><input class="form-control" id="fSpecialty"/></div>
        <div class="form-group"><label class="form-label">CRM</label><input class="form-control" id="fCrm"/></div>
      </div>

      <!-- Campos de senha — visíveis apenas no cadastro -->
      <div id="passwordSection">
        <hr class="divider" style="margin:1.25rem 0"/>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Senha Inicial
              <span style="font-size:.78rem;font-weight:400;color:var(--text-muted)"> (mín. 6 caracteres)</span>
            </label>
            <div style="position:relative">
              <input class="form-control" type="password" id="fPassword"
                     placeholder="Senha de acesso do médico" style="padding-right:2.5rem"/>
              <button type="button" onclick="togglePwd('fPassword','eyePwd')"
                      style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
                <i data-lucide="eye" id="eyePwd" style="width:16px;height:16px"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Senha</label>
            <input class="form-control" type="password" id="fPasswordConfirm" placeholder="Repita a senha"/>
          </div>
        </div>
      </div>

      <div id="modalErr" class="alert alert-warning" style="display:none;margin-top:.75rem">
        <i data-lucide="alert-triangle"></i><span id="modalErrTxt"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDoctor()"><i data-lucide="save"></i> Salvar</button>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  if (!App.requireAuth("admin")) throw 0;
  renderSidebar();

  let editingId = null;

  async function render() {
    App.showLoading("doctorsList");
    try {
      const doctors = await App.getAllDoctors();
      document.getElementById("doctorsList").innerHTML = doctors.map(d => `
        <div class="list-item" style="margin-bottom:.75rem">
          <div class="list-item-row">
            <div>
              <div class="list-item-title">${d.name}</div>
              <div class="list-item-sub">${d.specialty} · ${d.crm}</div>
              <div class="list-item-meta">${d.email} &nbsp;|&nbsp; CPF: ${d.cpf}</div>
              <div style="margin-top:.3rem;font-size:.72rem;color:var(--primary)">
                <i data-lucide="user" style="width:12px;height:12px;display:inline;vertical-align:middle"></i>
                Usuário: <code>${d.username || '–'}</code>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:1.25rem">
              <div style="text-align:right;font-size:.8rem;color:var(--text-muted)">
                <div>${d.attendances || 0} atendimentos</div>
                <div>${d.surgeries || 0} cirurgias · ${d.exams || 0} exames</div>
              </div>
              <button class="btn btn-secondary btn-sm" onclick="openEditModal('${d.id}')">
                <i data-lucide="edit-2"></i> Editar
              </button>
            </div>
          </div>
        </div>
      `).join("");
      lucide.createIcons();
    } catch(e) {
      App.showError("doctorsList", "Erro ao carregar médicos.");
    }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("modalTitle").textContent = "Cadastrar Médico";
    ["fName","fEmail","fPhone","fCpf","fSpecialty","fCrm","fPassword","fPasswordConfirm"]
      .forEach(id => document.getElementById(id).value = "");
    document.getElementById("passwordSection").style.display = "block";
    document.getElementById("modalErr").style.display = "none";
    document.getElementById("doctorModal").classList.add("open");
    lucide.createIcons();
  }

  function openEditModal(id) {
    editingId = id;
    document.getElementById("modalTitle").textContent = "Editar Médico";
    document.getElementById("passwordSection").style.display = "none"; // não exige senha na edição
    document.getElementById("modalErr").style.display = "none";
    // Preencher com dados atuais
    App.getAllDoctors().then(list => {
      const d = list.find(x => x.id === id);
      if (!d) return;
      document.getElementById("fName").value      = d.name      || "";
      document.getElementById("fEmail").value     = d.email     || "";
      document.getElementById("fPhone").value     = d.phone     || "";
      document.getElementById("fCpf").value       = d.cpf       || "";
      document.getElementById("fSpecialty").value = d.specialty || "";
      document.getElementById("fCrm").value       = d.crm       || "";
    });
    document.getElementById("doctorModal").classList.add("open");
    lucide.createIcons();
  }

  function closeModal() {
    document.getElementById("doctorModal").classList.remove("open");
  }

  function showModalErr(msg) {
    document.getElementById("modalErrTxt").textContent = msg;
    document.getElementById("modalErr").style.display = "flex";
    lucide.createIcons();
  }

  async function saveDoctor() {
    const name      = document.getElementById("fName").value.trim();
    const email     = document.getElementById("fEmail").value.trim();
    const phone     = document.getElementById("fPhone").value.trim();
    const cpf       = document.getElementById("fCpf").value.trim();
    const specialty = document.getElementById("fSpecialty").value.trim();
    const crm       = document.getElementById("fCrm").value.trim();

    if (!name || !specialty || !crm) {
      showModalErr("Preencha nome, especialidade e CRM."); return;
    }

    if (!editingId) {
      // Cadastro: senha obrigatória
      const pwd  = document.getElementById("fPassword").value;
      const conf = document.getElementById("fPasswordConfirm").value;
      if (!pwd || pwd.length < 6) { showModalErr("Senha deve ter no mínimo 6 caracteres."); return; }
      if (pwd !== conf)           { showModalErr("Senha e confirmação não coincidem."); return; }

      try {
        await App.createDoctor({ name, email, phone, cpf, specialty, crm, password: pwd });
        App.toast("Médico cadastrado com sucesso!");
        closeModal();
        render();
      } catch(e) { showModalErr(e.message || "Erro ao cadastrar."); }
    } else {
      // Edição: sem senha
      try {
        await App.updateDoctor(editingId, { name, email, phone, cpf, specialty, crm });
        App.toast("Médico atualizado com sucesso!");
        closeModal();
        render();
      } catch(e) { showModalErr(e.message || "Erro ao atualizar."); }
    }
  }

  function togglePwd(inputId, iconId) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === "password" ? "text" : "password";
    document.getElementById(iconId).setAttribute("data-lucide", inp.type === "password" ? "eye" : "eye-off");
    lucide.createIcons();
  }

  render();
</script>
</body>
</html>
